<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מרחב שיח — מנהל/ת ורכזת הכלה והוגנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#1a4a7a;--pl:#2563a8;--t:#2a9d8f;--tl:#3fb5a7;
  --mint:#d4f5ee;--sand:#fef3e2;--sand2:#f5d99a;
  --pur:#7c6cf6;--pur2:#ede9fe;
  --bg:#f4f6fa;--card:#fff;--bdr:#dde3ee;
  --tx:#1a2540;--muted:#6b7a99;--light:#9ba8bf;
  --ok:#2da56e;--ok2:#d1fae5;--warn:#e97316;--warn2:#fff3e0;--red:#e53e3e;
  --r:14px;--rs:8px;--sh:0 2px 12px rgba(26,74,122,0.08);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);direction:rtl;}
button,input,textarea,select{font-family:'Heebo',sans-serif;}
input,textarea,select{direction:rtl;}
button{cursor:pointer;}

.shell{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--p);color:#fff;position:fixed;top:0;right:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100;}
.slogo{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:9px;}
.sico{width:34px;height:34px;background:var(--t);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.stit{font-size:12px;font-weight:700;line-height:1.3;}
.ssub{font-size:11px;opacity:.6;margin-top:2px;}
.snav{padding:12px 9px;flex:1;}
.sstep{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;margin-bottom:3px;cursor:pointer;transition:all .2s;font-size:13px;opacity:.6;}
.sstep:hover{background:rgba(255,255,255,.1);opacity:.85;}
.sstep.active{background:rgba(255,255,255,.15);opacity:1;font-weight:600;}
.sstep.done{opacity:.85;}
.snum{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.sstep.active .snum{background:var(--t);border-color:var(--t);}
.sstep.done .snum{background:var(--ok);border-color:var(--ok);}
.sbot{padding:12px 9px;border-top:1px solid rgba(255,255,255,.12);}
.dbtn{width:100%;padding:8px;border-radius:7px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:5px;}
.dbtn:hover{background:rgba(255,255,255,.18);}
.main{margin-right:230px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--bdr);padding:11px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.05);}
.ttit{font-size:14px;font-weight:700;color:var(--p);}
.tsch{font-size:12px;color:var(--muted);}
.pwrap{flex:1;max-width:260px;margin:0 18px;}
.ptrack{height:5px;background:var(--bdr);border-radius:99px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--t),var(--p));border-radius:99px;transition:width .5s ease;}
.plbl{font-size:11px;color:var(--muted);margin-top:3px;text-align:center;}

.page{padding:26px;max-width:940px;margin:0 auto;width:100%;}
.ph h1{font-size:22px;font-weight:800;color:var(--p);margin-bottom:5px;}
.ph p{font-size:13px;color:var(--muted);line-height:1.6;max-width:600px;margin-bottom:22px;}

.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);padding:20px;margin-bottom:16px;}
.ch{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
.ci{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.ct{font-size:15px;font-weight:700;color:var(--p);}
.cs{font-size:12px;color:var(--muted);margin-top:2px;}

.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.full{grid-column:1/-1;}
.fgrp{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:13px;font-weight:600;color:var(--tx);}
.flbl-hint{font-size:11px;font-weight:400;color:var(--muted);margin-right:5px;}
.opt{font-weight:400;color:var(--muted);}
.finp{padding:9px 12px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:14px;color:var(--tx);background:#fff;transition:border .2s;direction:rtl;width:100%;}
.finp:focus{outline:none;border-color:var(--t);box-shadow:0 0 0 3px rgba(42,157,143,.12);}
.fta{resize:vertical;min-height:60px;line-height:1.6;}
.divider{border:none;border-top:1px solid var(--bdr);margin:18px 0;}

/* ── CheckSelect Dropdown ── */
.dd-wrap{position:relative;margin-top:5px;}
.dd-trigger{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border:1.5px solid var(--bdr);border-radius:var(--rs);background:#fff;cursor:pointer;transition:border .2s;user-select:none;}
.dd-trigger:hover{border-color:var(--t);}
.dd-trigger.has-val{border-color:var(--t);background:#f7fffe;}
.dd-trigger.open{border-color:var(--t);border-bottom-left-radius:0;border-bottom-right-radius:0;}
.dd-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.dd-placeholder{font-size:13px;color:var(--muted);}
.dd-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.dd-tag{padding:2px 9px;background:var(--mint);border-radius:99px;font-size:12px;color:#065f46;border:1px solid #6ee7b7;white-space:nowrap;}
.dd-tag-other{background:var(--pur2);color:#5b21b6;border-color:#c4b5fd;}
.dd-tag-x{margin-right:4px;opacity:.6;cursor:pointer;font-size:11px;}
.dd-tag-x:hover{opacity:1;}
.dd-arrow{font-size:11px;color:var(--muted);flex-shrink:0;margin-right:6px;transition:transform .2s;}
.dd-trigger.open .dd-arrow{transform:rotate(180deg);}
.dd-count{font-size:11px;color:var(--t);font-weight:700;background:var(--mint);padding:1px 7px;border-radius:99px;flex-shrink:0;}
.dd-panel{display:none;position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid var(--t);border-top:none;border-bottom-left-radius:var(--rs);border-bottom-right-radius:var(--rs);z-index:200;box-shadow:0 6px 20px rgba(26,74,122,.12);max-height:280px;overflow-y:auto;}
.dd-panel.open{display:block;}
.dd-item{display:flex;align-items:center;gap:9px;padding:8px 13px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--bdr);font-size:13px;}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover{background:#f0fdfa;}
.dd-item.on{background:#e8f8f5;}
.dd-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s;}
.dd-item.on .dd-box{background:var(--t);border-color:var(--t);color:#fff;}
.dd-other-item.on .dd-box{background:var(--pur);border-color:var(--pur);color:#fff;}
.dd-inp{margin:8px 12px 10px;border:1.5px dashed var(--t);border-radius:var(--rs);padding:7px 11px;font-size:13px;direction:rtl;width:calc(100% - 24px);background:#fff;}
.dd-inp:focus{outline:none;}
.cs-count{font-size:11px;color:var(--muted);font-weight:400;}

/* ── Goal name suggestions ── */
.goal-sug{display:flex;flex-direction:column;gap:5px;margin-bottom:9px;}
.gsug{padding:9px 13px;background:linear-gradient(135deg,#f0fdf4,#ecfeff);border:1px dashed var(--t);border-radius:var(--rs);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;}
.gsug:hover{background:var(--mint);border-style:solid;}
.gsug.active{background:var(--mint);border-style:solid;border-color:var(--t);}
.gsug-ico{font-size:11px;font-weight:700;color:var(--t);flex-shrink:0;}
.gsug-free{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sand);border:1.5px solid var(--sand2);border-radius:var(--rs);cursor:pointer;font-size:13px;color:#7c5c0e;font-weight:600;}

.guidance{background:linear-gradient(135deg,var(--sand),var(--mint));border-radius:var(--r);padding:15px 19px;margin-bottom:16px;border-right:4px solid var(--t);}
.guidance .gt{font-size:13px;font-weight:700;color:var(--p);margin-bottom:4px;}
.guidance p{font-size:13px;color:var(--tx);line-height:1.6;}

.zcard{background:var(--card);border-radius:var(--r);border:2px solid var(--bdr);padding:18px;margin-bottom:13px;transition:all .2s;}
.zcard.sel{border-color:var(--t);box-shadow:0 0 0 3px rgba(42,157,143,.1);}
.zh{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;}
.znum{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;}
.ztit{font-size:14px;font-weight:700;color:var(--p);line-height:1.35;}
.zdsc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.zwhy{background:var(--pur2);border-radius:var(--rs);padding:9px 13px;margin-bottom:10px;font-size:12px;color:var(--tx);line-height:1.55;}
.exlbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.echip{padding:3px 9px;background:var(--bg);border:1px solid var(--bdr);border-radius:99px;font-size:12px;color:var(--muted);}
.focus-lbl{font-size:13px;font-weight:700;margin-bottom:7px;}
.focus-row{display:flex;gap:6px;}
.fbtn{flex:1;padding:8px 5px;border-radius:7px;border:2px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted);text-align:center;line-height:1.3;}
.fbtn:hover{border-color:var(--p);color:var(--p);}
.fbtn.fh{background:#fff0f0;border-color:#f87171;color:#c53030;}
.fbtn.fm{background:#fffbf0;border-color:#f59e0b;color:#92400e;}
.fbtn.fk{background:var(--ok2);border-color:#6ee7b7;color:#065f46;}
.fsub{font-size:10px;font-weight:400;opacity:.7;display:block;margin-top:1px;}

.cross-card{background:var(--pur2);border-radius:var(--r);padding:15px 19px;border:1px solid #c4b5fd;margin-bottom:13px;}
.xitem{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:7px;border:2px solid var(--bdr);background:#fff;cursor:pointer;margin-bottom:6px;transition:all .2s;}
.xitem.active{border-color:var(--pur);background:#f5f3ff;}

.ztabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.ztab{padding:7px 13px;border-radius:7px;border:2px solid var(--bdr);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted);}
.ztab.active{color:#fff;border-color:transparent;}

.gbadge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:11px;}
.gb-req{background:var(--p);color:#fff;}
.gb-opt{background:var(--bdr);color:var(--muted);}
.type-btns{display:flex;gap:6px;margin-bottom:11px;}
.tbtn{padding:7px 14px;border-radius:7px;border:2px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted);}
.tbtn.tnew{background:#eff6ff;border-color:var(--pl);color:var(--p);}
.tbtn.tong{background:var(--sand);border-color:var(--sand2);color:#7c5c0e;}
.ongoing-box{background:var(--sand);border-radius:var(--rs);padding:13px;margin-bottom:11px;}
.scopes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px;}
.schip{padding:6px 12px;border-radius:7px;border:2px solid var(--bdr);font-size:12px;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted);font-weight:500;}
.schip.active{background:var(--t);border-color:var(--t);color:#fff;font-weight:700;}

.at-lbl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--p);margin-bottom:7px;padding-bottom:5px;border-bottom:2px solid var(--bdr);}
.atdot{width:8px;height:8px;border-radius:50%;}
.action-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rs);border:1.5px solid var(--bdr);cursor:pointer;transition:all .2s;background:#fff;margin-bottom:5px;}
.action-item:hover{border-color:var(--t);background:#f0fdfa;}
.action-item.ac{border-color:var(--p);background:#eff6ff;}
.action-item.as{border-color:var(--light);background:var(--bg);}
.acheck{width:16px;height:16px;border-radius:4px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s;}
.ac .acheck{background:var(--p);border-color:var(--p);color:#fff;}
.as .acheck{background:var(--light);border-color:var(--light);color:#fff;}
.atag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--p);color:#fff;opacity:0;}
.ac .atag{opacity:1;}
.cin-row{display:flex;gap:6px;margin-top:7px;}
.addbtn{padding:7px 13px;background:var(--t);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:600;white-space:nowrap;}
.addbtn:hover{background:var(--tl);}

.mchips{display:flex;flex-wrap:wrap;gap:6px;}
.mchip{padding:6px 12px;border-radius:99px;border:2px solid var(--bdr);font-size:12px;cursor:pointer;transition:all .2s;background:#fff;color:var(--muted);}
.mchip.am{background:var(--pur);border-color:var(--pur);color:#fff;font-weight:600;}
.mchip.ap{background:var(--t);border-color:var(--t);color:#fff;font-weight:600;}

.metric-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rs);border:1.5px solid var(--bdr);cursor:pointer;transition:all .2s;background:#fff;margin-bottom:5px;}
.metric-item:hover{border-color:var(--t);}
.metric-item.on{border-color:var(--t);background:#f0fdfa;}
.mcheck{width:16px;height:16px;border-radius:4px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s;}
.on .mcheck{background:var(--t);border-color:var(--t);color:#fff;}
.mnum{width:50px;padding:3px 6px;border:1.5px solid var(--bdr);border-radius:5px;font-size:13px;text-align:center;}

.cpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.cpcard{background:var(--bg);border-radius:var(--rs);padding:13px;border:1.5px solid var(--bdr);}
.cptit{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.cpdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.alert{padding:10px 14px;border-radius:var(--rs);margin-bottom:11px;font-size:13px;display:flex;gap:7px;align-items:flex-start;}
.alert.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;}

.navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 26px;background:#fff;border-top:1px solid var(--bdr);position:sticky;bottom:0;}
.btn-back{padding:10px 20px;border-radius:var(--rs);border:2px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:all .2s;}
.btn-back:hover{border-color:var(--p);color:var(--p);}
.btn-back:disabled{opacity:.4;cursor:not-allowed;}
.btn-next{padding:10px 24px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;background:var(--p);color:#fff;transition:all .2s;}
.btn-next:hover{background:var(--pl);}
.btn-next:disabled{opacity:.4;cursor:not-allowed;}

/* ── SUMMARY ── */
.shd{background:linear-gradient(135deg,var(--p) 0%,var(--t) 100%);color:#fff;border-radius:var(--r);padding:24px 28px;margin-bottom:20px;}
.shd h2{font-size:21px;font-weight:800;margin-bottom:3px;}
.shd p{opacity:.85;font-size:14px;}
.smeta{display:flex;flex-wrap:wrap;gap:14px;margin-top:13px;}
.smi{display:flex;align-items:center;gap:5px;font-size:13px;}
.szone{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:16px;overflow:hidden;}
.szh{padding:13px 19px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);}
.szb{padding:17px 19px;}
.sgoal{margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--bdr);}
.sgoal:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.sgt{font-size:14px;font-weight:700;color:var(--p);margin-bottom:8px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
.sf label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.sf p{font-size:13px;color:var(--tx);line-height:1.5;}
.stags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.tag{padding:2px 8px;border-radius:99px;font-size:12px;}
.tb{background:#dbeafe;color:var(--p);}
.tt{background:var(--mint);color:#065f46;}
.tpu{background:var(--pur2);color:#5b21b6;}
.ts{background:var(--sand);color:#7c5c0e;}

@media print{
  .sidebar,.topbar,.navbar,.noprint{display:none!important;}
  .main{margin-right:0;}
  .page{padding:14px;max-width:100%;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
@media(max-width:700px){
  .sidebar{display:none;}.main{margin-right:0;}
  .fg,.cpgrid,.sgrid{grid-template-columns:1fr;}
  .full{grid-column:1;}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="slogo">
      <div class="sico">🌿</div>
      <div><div class="stit">מרחב שיח</div><div class="ssub">מנהל/ת ורכזת הכלה והוגנות</div></div>
    </div>
    <nav class="snav" id="snav"></nav>
    <div class="sbot">
      <button class="dbtn" onclick="loadDemo()">📋 טעינת דוגמה</button>
      <button class="dbtn" onclick="resetAll()">🔄 איפוס</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><div class="ttit" id="toptitle"></div><div class="tsch" id="topschool"></div></div>
      <div class="pwrap"><div class="ptrack"><div class="pfill" id="pfill"></div></div><div class="plbl" id="plbl"></div></div>
    </div>
    <div id="content" style="flex:1;"></div>
    <div class="navbar noprint">
      <button class="btn-back" id="btnBack" onclick="prevStep()">→ הקודם</button>
      <span style="font-size:13px;color:var(--muted)" id="navMsg"></span>
      <button class="btn-next" id="btnNext" onclick="nextStep()">הבא ←</button>
    </div>
  </main>
</div>

<script>
// ── ANSWER BANKS ──────────────────────────────────────────────────────────────
const SHARED = {
  desiredState: [
    "תהליך עבודה סדור, ברור ועקבי",
    "שימוש רחב יותר של הצוות בפרקטיקות הרלוונטיות",
    "שיפור בדיוק המענים הניתנים לתלמידים",
    "עלייה בתחושת המסוגלות של הצוות",
    "שיפור במעורבות ובהשתתפות התלמידים",
    "שפה מקצועית משותפת בצוות",
    "הרחבת היישום לשכבות / כיתות נוספות",
    "הטמעה של שגרות עבודה קבועות",
    "שיפור במעקב אחר התקדמות תלמידים",
    "ביסוס תהליך שניתן להמשיך גם בשנה הבאה"
  ],
  dataBase: [
    "נתוני מיפוי בית ספריים",
    "נתוני עוגן / עוגן-פלוס",
    "תצפיות בכיתות",
    "שיחות עם הנהלה",
    "שיחות עם מחנכות ומורים",
    "נתונים לימודיים",
    "נתונים רגשיים / חברתיים / התנהגותיים",
    "תוכניות התערבות קודמות",
    "משוב מהצוות החינוכי",

// ── HELPERS ──────────────────────────────────────────────────────────────────
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function csText(v){
  if(!v) return "";
  if(typeof v==="string") return v;
  const parts=[...(v.items||[])];
  if(v.other) parts.push(v.other);
  return parts.join(" | ");
}
function csHasValue(v){if(!v) return false;if(typeof v==="string") return !!v;return (v.items&&v.items.length>0)||!!v.other;}

// ── DROPDOWN CHECKSELECT ──────────────────────────────────────────────────────
// Track open dropdowns by DOM ID — no re-render needed for open/close
function ddId(prefix){return "dd_"+prefix.replace(/[^a-z0-9]/gi,"_");}

function toggleDD(id){
  const panel=document.getElementById(id+"_panel");
  const trigger=document.getElementById(id+"_trigger");
  if(!panel||!trigger)return;
  const isOpen=panel.classList.contains("open");
  // Close all other dropdowns first
  document.querySelectorAll(".dd-panel.open").forEach(p=>{
    p.classList.remove("open");
    const t=document.getElementById(p.id.replace("_panel","_trigger"));
    if(t)t.classList.remove("open");
  });
  if(!isOpen){panel.classList.add("open");trigger.classList.add("open");}
}

// Close dropdowns when clicking outside
document.addEventListener("click",function(e){
  if(!e.target.closest(".dd-wrap")){
    document.querySelectorAll(".dd-panel.open").forEach(p=>{
      p.classList.remove("open");
      const t=document.getElementById(p.id.replace("_panel","_trigger"));
      if(t)t.classList.remove("open");
    });
  }
});

function renderDD(uid, items, other, options, label, full, onToggleItem, onSetOther){
  const selected=items.filter(x=>x!=="__other__");
  const showOther=items.includes("__other__");
  const hasVal=selected.length>0||!!other;
  const id=ddId(uid);
  return `<div class="fgrp${full?" full":""}">
    <label class="flbl">${label}</label>
    <div class="dd-wrap" onclick="event.stopPropagation()">
      <div class="dd-trigger ${hasVal?"has-val":""}" id="${id}_trigger" onclick="toggleDD('${id}')">
        <div class="dd-left">
          ${hasVal
            ?`<div class="dd-tags">
                ${selected.map(i=>`<span class="dd-tag">${h(i)}</span>`).join("")}
                ${other?`<span class="dd-tag dd-tag-other">${h(other)}</span>`:""}
              </div>`
            :`<span class="dd-placeholder">בחרי אפשרויות...</span>`
          }
        </div>
        ${hasVal?`<span class="dd-count">${selected.length+(other?1:0)}</span>`:""}
        <span class="dd-arrow">▾</span>
      </div>
      <div class="dd-panel" id="${id}_panel">
        ${options.map(opt=>`
          <div class="dd-item ${items.includes(opt)?"on":""}" onclick="${onToggleItem}('${opt.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">
            <span class="dd-box">${items.includes(opt)?"✓":""}</span>
            <span>${h(opt)}</span>
          </div>`).join("")}
        <div class="dd-item dd-other-item ${showOther?"on":""}" onclick="${onToggleItem}('__other__')">
          <span class="dd-box" style="${showOther?"background:var(--pur);border-color:var(--pur);color:#fff":""}">✎</span>
          <span style="color:${showOther?"var(--pur)":"var(--muted)"}">אחר — ניסוח חופשי</span>
        </div>
        ${showOther?`<input class="dd-inp" placeholder="כתבי ניסוח קצר ומדויק..." value="${h(other)}" oninput="${onSetOther}(this.value)" onclick="event.stopPropagation()">`:""}
      </div>
    </div>
  </div>`;
}

  // Register inline handlers via global function map
  window[`_tcs_${uid}`]=function(opt){
    const g=S.zones[zid][gk];
    const v=g[field]||{items:[],other:""};
    const its=[...(v.items||[])];
    if(its.includes(opt)){g[field]={...v,items:its.filter(x=>x!==opt),other:opt==="__other__"?"":v.other};}
    else{g[field]={...v,items:[...its,opt]};}
    // Re-render only the trigger+panel, not the whole page
    const id=ddId(uid);
    const newVal=g[field];
    const newItems=newVal.items||[];
    const newOther=newVal.other||"";
    const newSelected=newItems.filter(x=>x!=="__other__");
    const newShowOther=newItems.includes("__other__");
    const hasVal=newSelected.length>0||!!newOther;
    // Update trigger display
    const trigger=document.getElementById(id+"_trigger");
    if(trigger){
      const left=trigger.querySelector(".dd-left");
      if(left){left.innerHTML=hasVal
        ?newSelected.map(i=>`<span class="dd-tag">${h(i)}</span>`).join("")+(newOther?`<span class="dd-tag dd-tag-other">${h(newOther)}</span>`:"")
        :`<span class="dd-placeholder">בחרי אפשרויות...</span>`;}
      trigger.className="dd-trigger "+(hasVal?"has-val ":"")+"open";
      const countEl=trigger.querySelector(".dd-count");
      const count=newSelected.length+(newOther?1:0);
      if(countEl){countEl.textContent=count;countEl.style.display=count>0?"":"none";}
      else if(count>0){const arrow=trigger.querySelector(".dd-arrow");if(arrow){const c=document.createElement("span");c.className="dd-count";c.textContent=count;trigger.insertBefore(c,arrow);}}
    }
    // Update panel items
    const panel=document.getElementById(id+"_panel");
    if(panel){
      panel.querySelectorAll(".dd-item:not(.dd-other-item)").forEach((el,i)=>{
        const isOn=newItems.includes(options[i]);
        el.className="dd-item"+(isOn?" on":"");
        const box=el.querySelector(".dd-box");
        if(box)box.textContent=isOn?"✓":"";
      });
      const otherItem=panel.querySelector(".dd-other-item");
      if(otherItem){
        otherItem.className="dd-item dd-other-item"+(newShowOther?" on":"");
        const ob=otherItem.querySelector(".dd-box");
        if(ob){ob.textContent=newShowOther?"✓":"";ob.style=newShowOther?"background:var(--pur);border-color:var(--pur);color:#fff":"";}
      }
      let inp=panel.querySelector(".dd-inp");
      if(newShowOther&&!inp){
        inp=document.createElement("input");inp.className="dd-inp";
        inp.placeholder="כתבי ניסוח קצר ומדויק...";inp.value=newOther;
        inp.addEventListener("input",function(){window[`_scs_${uid}`](this.value);});
        inp.addEventListener("click",function(e){e.stopPropagation();});
        panel.appendChild(inp);
      } else if(!newShowOther&&inp){inp.remove();}
    }
  };
  window[`_scs_${uid}`]=function(val){
    S.zones[zid][gk][field]={...(S.zones[zid][gk][field]||{items:[]})};
    S.zones[zid][gk][field].other=val;
  };
  return renderDD(uid,items,other,options,label,full,`_tcs_${uid}`,`_scs_${uid}`);
}
function toggleCS(zid,gk,field,opt){window[`_tcs_${zid}_${gk}_${field}`]&&window[`_tcs_${zid}_${gk}_${field}`](opt);}
function setCSother(zid,gk,field,val){window[`_scs_${zid}_${gk}_${field}`]&&window[`_scs_${zid}_${gk}_${field}`](val);}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderSidebar();refreshTopBar();
  const c=document.getElementById("content");
  if(S.step===1)c.innerHTML=renderS1();
  else if(S.step===2)c.innerHTML=renderS2();
  else if(S.step===3)c.innerHTML=renderS3();
  else if(S.step===4)c.innerHTML=renderS4();
  else if(S.step===5)c.innerHTML=renderS5();
  else c.innerHTML=renderS6();
  updateNav();
}
function renderSidebar(){
  document.getElementById("snav").innerHTML=STEPS.map(s=>`
    <div class="sstep ${S.step===s.id?"active":""} ${S.step>s.id?"done":""}" onclick="gotoStep(${s.id})">
      <div class="snum">${S.step>s.id?"✓":s.id}</div><span>${s.l}</span>
    </div>`).join("");
}
function refreshTopBar(){
  document.getElementById("toptitle").textContent=STEPS[S.step-1].i+" "+STEPS[S.step-1].l;
  document.getElementById("topschool").textContent=S.setup.school?(S.setup.school+" · "+S.setup.year):"";
  document.getElementById("pfill").style.width=((S.step-1)/5*100)+"%";
  document.getElementById("plbl").textContent="שלב "+S.step+" מתוך 6";
}
function updateNav(){
  document.getElementById("btnBack").disabled=S.step===1;
  const ok=canProceed();
  const next=document.getElementById("btnNext");
  const msg=document.getElementById("navMsg");
  if(S.step<6){next.textContent="הבא ←";next.disabled=!ok;msg.textContent=!ok?"⚠️ יש להשלים שדות חובה":"";}
  else{next.textContent="🖨️ הדפסה";next.disabled=false;msg.textContent="";}
}
function canProceed(){
  if(S.step===1)return S.setup.school&&S.setup.coordinator&&S.setup.principal;
  if(S.step===2)return ZONES.every(z=>S.zones[z.id].focus);
  if(S.step===3)return ZONES.every(z=>S.zones[z.id].g1.text);
  return true;
}
function prevStep(){if(S.step>1){S.step--;render();}}
function nextStep(){if(S.step<6&&canProceed()){S.step++;render();}else if(S.step===6){window.print();}}
function gotoStep(n){if(n<=S.step||S.step>1){S.step=n;render();}}
function setTab(t){S.tab=t;render();}
function loadDemo(){S={...DEMO};render();}
function resetAll(){if(confirm("לאפס את כל הנתונים?")){S={step:1,tab:"z1",setup:{school:"",year:'תשפ"ו',principal:"",coordinator:"",district:"",grades:"",date:new Date().toLocaleDateString("he-IL"),meetings:"",experience:"",situation:mkCS(),processes:mkCS(),practices:"",insights:mkCS(),challenges:mkCS(),strengths:mkCS()},zones:{z1:mkZone(),z2:mkZone(),z3:mkZone(),z4:mkZone()},cross:[]};render();}}

      <div class="ch" style="margin-bottom:11px"><div class="ci" style="background:var(--pur2)">🔗</div><div class="ct">רווחים נלווים</div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${cross.map(id=>{const ca=CROSS.find(c=>c.id===id);return ca?`<div style="padding:8px 14px;background:var(--pur2);border-radius:7px;border:1px solid #c4b5fd"><span style="font-size:14px;margin-left:5px">${ca.icon}</span><strong style="font-size:13px">${ca.title}</strong><span style="font-size:12px;color:var(--muted);margin-right:5px">— ${ca.desc}</span></div>`:"";}).join("")}
      </div></div>`:""}
    <div style="text-align:center;padding:16px 0;color:var(--muted);font-size:12px;border-top:1px solid var(--bdr);margin-top:8px">
      מרחב שיח — מנהל/ת ורכזת הכלה והוגנות · ${h(setup.school)} · ${h(setup.year)}
    </div>
  </div>`;
}

function renderZTabs(){
  return `<div class="ztabs">${ZONES.map(z=>`
    <button class="ztab ${S.tab===z.id?"active":""}" style="${S.tab===z.id?"background:"+z.color:""}" onclick="setTab('${z.id}')">
      ${S.zones[z.id].g1.text?"✓ ":""}${z.num}. ${z.title.split(" ").slice(0,3).join(" ")}...
    </button>`).join("")}</div>`;
}

render();
</script>
</body>
</html>
